services:
  # ============================================
  # MESSAGE BROKERS
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: devmetrics-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devmetrics-internal

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: devmetrics-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: devmetrics
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-devmetrics_secret}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - devmetrics-internal

  # ============================================
  # APPLICATIONS (NestJS Microservices)
  # ============================================
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: devmetrics-api
    restart: unless-stopped
    env_file:
      - .env # ¡Lee TODO desde el archivo .env del servidor!
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devmetrics-internal

  sync:
    build:
      context: .
      dockerfile: infrastructure/docker/sync.Dockerfile
    container_name: devmetrics-sync
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4002:4002"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devmetrics-internal

  workers:
    build:
      context: .
      dockerfile: infrastructure/docker/workers.Dockerfile
    container_name: devmetrics-workers
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devmetrics-internal

  # ============================================
  # REVERSE PROXY
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: devmetrics-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api # Eliminé 'web' porque ya no existe en este compose
    networks:
      - devmetrics-internal

# ============================================
# VOLUMES & NETWORKS
# ============================================
volumes:
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  devmetrics-internal:
    driver: bridge
    name: devmetrics-network
