# .github/workflows/feature_pipeline.yml
name: Daily Feature Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  run-feature-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy sqlalchemy psycopg2-binary redis
      
      - name: Run feature pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
        run: |
          python apps/workers/src/features/feature_pipeline.py
          python apps/workers/src/features/online_store.py