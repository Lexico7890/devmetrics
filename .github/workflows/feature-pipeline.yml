# .github/workflows/feature-pipeline.yml

name: Daily Feature Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC diario
  workflow_dispatch:  # Manual trigger

jobs:
  generate-features:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./ml
        run: pip install -r requirements.txt

      - name: Run ML Pipeline
        working-directory: ./ml/src
        env:
          # Inyectamos de los Secrets de GitHub las URLs a nuestra base en AWS
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          REDIS_URL: ${{ secrets.PROD_REDIS_URL }}
        run: |
          # Si tienes un script que itere por todos los repos (ej. run_all.py), llámalo aquí.
          # Por ahora, demostración utilizando un repositorio específico por argumento o llamándolo desde python:
          # python -c "from features.pipeline import DebtFeaturePipeline; DebtFeaturePipeline().run('all_or_some_logic')"
          echo "Aquí ejecutarías tu iterador de pipeline.py para calcular los features!"