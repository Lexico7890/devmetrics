version: "3.9"

services:
  # ============================================
  # DATABASES & MESSAGE BROKERS
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: devmetrics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devmetrics
      POSTGRES_USER: devmetrics
      POSTGRES_PASSWORD: devmetrics_secret
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devmetrics -d devmetrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - devmetrics-internal

  redis:
    image: redis:7-alpine
    container_name: devmetrics-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devmetrics-internal

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: devmetrics-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: devmetrics
      RABBITMQ_DEFAULT_PASS: devmetrics_secret
      RABBITMQ_DEFAULT_VHOST: devmetrics
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - devmetrics-internal

  # ============================================
  # APPLICATIONS
  # ============================================
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    container_name: devmetrics-web
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - DATABASE_URL=postgresql://devmetrics:devmetrics_secret@postgres:5432/devmetrics?schema=auth
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devmetrics-internal

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: devmetrics-api
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://devmetrics:devmetrics_secret@postgres:5432/devmetrics
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://devmetrics:devmetrics_secret@rabbitmq:5672/devmetrics
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devmetrics-internal

  workers:
    build:
      context: .
      dockerfile: infrastructure/docker/workers.Dockerfile
    container_name: devmetrics-workers
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://devmetrics:devmetrics_secret@postgres:5432/devmetrics
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://devmetrics:devmetrics_secret@rabbitmq:5672/devmetrics
    volumes:
      - ./apps/workers:/app/apps/workers
      - ./packages:/app/packages
      - /app/apps/workers/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devmetrics-internal

  # ============================================
  # REVERSE PROXY
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: devmetrics-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    networks:
      - devmetrics-internal

  # ============================================
  # DEV TOOLS (solo para desarrollo)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devmetrics-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@devmetrics.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devmetrics-internal

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: devmetrics-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - devmetrics-internal

# ============================================
# VOLUMES & NETWORKS
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  devmetrics-internal:
    driver: bridge
    name: devmetrics-network